<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WStudio 文档中心</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #myButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        #myButton:hover {
            background-color: #45a049;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        #myButton:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <h1>WStudio 文档中心</h1>
    <br>
    <button id="myButton" onclick="window.location.href='/hifumi-bot';">Hifumi-Bot阿慈谷日富美 使用文档</button>
</body>
</html>
